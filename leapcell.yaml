service:
  name: vvstudios-scraper
  type: web
  runtime: python3.12
  # Start the init script first, THEN start the web server
  command: python init_browser.py && gunicorn --bind 0.0.0.0:$PORT --timeout 600 app:app
  build_command: pip install -r requirements.txt
  env:
    - SUPABASE_URL
    - SUPABASE_SERVICE_ROLE_KEY
    - PLAYWRIGHT_BROWSERS_PATH=/app/.cache
